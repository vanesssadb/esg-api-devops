services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    environment:
      ORACLE_PASSWORD: oracle
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./oracle-init/oracle-init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'select 1 from dual;' | sqlplus -s system/oracle@localhost/XEPDB1"]
      interval: 15s
      timeout: 10s
      retries: 15

  app:
    build: .
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: APP
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_FLYWAY_ENABLED: "true"
      SECURITY_JWT_SECRET: "esta-e-uma-chave-secreta-de-exemplo-bem-grande-para-jwt-1234567890"
      SECURITY_JWT_EXPIRATION: "86400000"
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  oracle-data: