name: CI/CD Pipeline - ESG API

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build e Testes Automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Dar permissão ao Maven Wrapper
        run: chmod +x mvnw

      - name: Subir ambiente com Docker Compose
        run: docker compose up -d --build

      - name: Aguardar aplicação inicializar
        run: |
          echo "Aguardando API ficar disponível..."
          for i in {1..30}; do
            if curl -f http://localhost:8080/health; then
              echo "API disponível!"
              exit 0
            fi
            echo "Tentativa $i: API ainda não disponível..."
            sleep 10
          done
          echo "API não ficou disponível a tempo."
          docker compose logs
          exit 1

      - name: Executar testes automatizados
        run: ./mvnw clean test

      - name: Encerrar containers
        if: always()
        run: docker compose down -v

  docker-build:
    name: Build da Imagem Docker
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t cidades-esg-api-app .

  deploy-staging:
    name: Deploy Staging (simulado)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Deploy em staging
        run: echo "Deploy realizado em ambiente STAGING"

  deploy-production:
    name: Deploy Produção (simulado)
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Deploy em produção
        run: echo "Deploy realizado em ambiente PRODUÇÃO"