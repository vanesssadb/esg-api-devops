name: CI/CD Pipeline - ESG API

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-package:
    name: Build da Aplicação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Dar permissão ao Maven Wrapper
        run: chmod +x mvnw

      - name: Build com Maven
        run: ./mvnw clean install -DskipTests

  docker-build:
    name: Build da Imagem Docker
    runs-on: ubuntu-latest
    needs: build-and-package

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t esg-api-devops .

  deploy-staging:
    name: Deploy Staging (simulado)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Deploy em staging
        run: echo "Deploy realizado em ambiente STAGING"

  deploy-production:
    name: Deploy Produção (simulado)
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Deploy em produção
        run: echo "Deploy realizado em ambiente PRODUÇÃO"